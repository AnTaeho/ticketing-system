<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>V7 대기열 실시간 데모</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a; color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 2rem; min-height: 100vh;
        }

        header { margin-bottom: 2rem; }
        header h1 { font-size: 1.75rem; font-weight: 700; color: #f1f5f9; }
        header p  { color: #64748b; margin-top: 0.3rem; font-size: 0.9rem; }

        /* ── 컨트롤 패널 ── */
        .controls {
            background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 1.5rem; display: flex; flex-wrap: wrap; gap: 1.2rem;
            align-items: flex-end; margin-bottom: 1.5rem;
        }
        .field { display: flex; flex-direction: column; gap: 0.35rem; }
        .field label { color: #94a3b8; font-size: 0.8rem; letter-spacing: 0.05em; text-transform: uppercase; }
        .field input {
            background: #0f172a; border: 1px solid #475569; color: #f1f5f9;
            padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 1rem; width: 130px;
            outline: none;
        }
        .field input:focus { border-color: #3b82f6; }

        .btn {
            padding: 0.55rem 1.4rem; border: none; border-radius: 8px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
        }
        .btn-start  { background: #2563eb; color: #fff; }
        .btn-start:hover:not(:disabled) { background: #1d4ed8; }
        .btn-start:disabled { background: #1e3a5f; color: #4b6380; cursor: not-allowed; }
        .btn-reset  { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
        .btn-reset:hover { background: #334155; }

        /* ── 상태 뱃지 ── */
        .badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.25rem 0.85rem; border-radius: 9999px; font-size: 0.8rem;
            font-weight: 600; margin-bottom: 1.5rem;
        }
        .badge-idle    { background: #1e293b; color: #64748b; border: 1px solid #334155; }
        .badge-running { background: #14532d; color: #4ade80; }
        .badge-done    { background: #1e3a5f; color: #60a5fa; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .dot.pulse { animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

        /* ── 대기열 시각화 ── */
        .queue-section {
            background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .queue-section h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 1.2rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .queue-row { margin-bottom: 1.2rem; }
        .queue-row:last-child { margin-bottom: 0; }
        .queue-meta {
            display: flex; justify-content: space-between;
            font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.5rem;
        }
        .queue-meta .label { font-weight: 600; }
        .queue-meta .count { font-weight: 700; color: #e2e8f0; }
        .bar-track {
            background: #0f172a; border-radius: 8px; height: 32px; overflow: hidden; position: relative;
        }
        .bar-fill {
            height: 100%; border-radius: 8px; width: 0%;
            transition: width 0.4s ease; display: flex; align-items: center; padding-left: 12px;
            font-size: 0.78rem; font-weight: 700; color: rgba(255,255,255,0.85);
        }
        .bar-processing { background: linear-gradient(90deg, #1d4ed8, #3b82f6); }
        .bar-waiting    { background: linear-gradient(90deg, #92400e, #f59e0b); }

        /* ── 스탯 카드 그리드 ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem; margin-bottom: 1.5rem;
        }
        .card {
            background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem;
        }
        .card-label { font-size: 0.78rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .card-value { font-size: 2.2rem; font-weight: 800; line-height: 1; }
        .card-unit  { font-size: 0.8rem; color: #64748b; margin-top: 0.3rem; }
        .c-blue   { color: #60a5fa; }
        .c-green  { color: #4ade80; }
        .c-red    { color: #f87171; }
        .c-yellow { color: #fbbf24; }
        .c-gray   { color: #94a3b8; }

        .mini-bar { background: #0f172a; border-radius: 4px; height: 5px; margin-top: 0.75rem; overflow: hidden; }
        .mini-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
        .mini-green  { background: #22c55e; }
        .mini-blue   { background: #3b82f6; }

        /* ── 진행률 푸터 ── */
        .progress-footer {
            background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem;
        }
        .progress-footer .row { display: flex; justify-content: space-between; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.6rem; }
        .progress-footer .row span:last-child { font-weight: 700; color: #f1f5f9; }
        .big-bar-track { background: #0f172a; border-radius: 6px; height: 10px; overflow: hidden; }
        .big-bar-fill  { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #2563eb, #7c3aed); transition: width 0.4s ease; }
    </style>
</head>
<body>

<header>
    <h1>🎫 V7 대기열 실시간 데모</h1>
    <p>Redis Sorted Set 대기열 + DECR 재고 선점 — 동시 요청 처리 과정을 실시간으로 확인합니다</p>
</header>

<!-- 컨트롤 패널 -->
<div class="controls">
    <div class="field">
        <label>공연 ID</label>
        <input type="number" id="concertId" value="137" min="1">
    </div>
    <div class="field">
        <label>동시 사용자 수</label>
        <input type="number" id="users" value="500" min="10" max="3000" step="100">
    </div>
    <button class="btn btn-start" id="startBtn" onclick="startDemo()">▶ 데모 시작</button>
    <button class="btn btn-reset" onclick="resetUI()">↺ 화면 초기화</button>
</div>

<div id="badge" class="badge badge-idle">
    <span class="dot"></span>
    <span id="badgeText">대기 중</span>
</div>

<!-- 대기열 현황 -->
<div class="queue-section">
    <h2>대기열 현황</h2>
    <div class="queue-row">
        <div class="queue-meta">
            <span class="label">처리열 (Processing Queue)</span>
            <span class="count"><span id="processingCount">0</span> / 200</span>
        </div>
        <div class="bar-track">
            <div class="bar-fill bar-processing" id="processingBar"></div>
        </div>
    </div>
    <div class="queue-row">
        <div class="queue-meta">
            <span class="label">대기열 (Waiting Queue)</span>
            <span class="count"><span id="waitingCount">0</span>명</span>
        </div>
        <div class="bar-track">
            <div class="bar-fill bar-waiting" id="waitingBar"></div>
        </div>
    </div>
</div>

<!-- 스탯 카드 -->
<div class="grid">
    <div class="card">
        <div class="card-label">전체 사용자</div>
        <div class="card-value c-blue" id="totalUsers">-</div>
        <div class="card-unit">명 접속 시도</div>
    </div>
    <div class="card">
        <div class="card-label">대기열 진입</div>
        <div class="card-value c-gray" id="enqueuedCount">0</div>
        <div class="card-unit">명 토큰 발급</div>
    </div>
    <div class="card">
        <div class="card-label">예약 성공 🎉</div>
        <div class="card-value c-green" id="successCount">0</div>
        <div class="card-unit">명 티켓 선점</div>
        <div class="mini-bar"><div class="mini-fill mini-green" id="successBar" style="width:0%"></div></div>
    </div>
    <div class="card">
        <div class="card-label">품절 거절</div>
        <div class="card-value c-red" id="soldOutCount">0</div>
        <div class="card-unit">명 재고 소진</div>
    </div>
    <div class="card">
        <div class="card-label">처리 실패</div>
        <div class="card-value c-gray" id="failedCount">0</div>
        <div class="card-unit">명 오류/타임아웃</div>
    </div>
    <div class="card">
        <div class="card-label">이탈 (50% 확률)</div>
        <div class="card-value c-gray" id="abandonedCount">0</div>
        <div class="card-unit">명 처리열 자진 이탈</div>
    </div>
    <div class="card">
        <div class="card-label">남은 재고 (Redis)</div>
        <div class="card-value c-yellow" id="redisStock">100</div>
        <div class="card-unit">장 남음</div>
        <div class="mini-bar"><div class="mini-fill mini-blue" id="stockBar" style="width:100%"></div></div>
    </div>
</div>

<!-- 전체 진행률 -->
<div class="progress-footer">
    <div class="row">
        <span>전체 진행률</span>
        <span id="progressText">0 / 0</span>
    </div>
    <div class="big-bar-track">
        <div class="big-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
</div>

<script>
    let sse = null;
    let totalUsersVal = 0;

    function startDemo() {
        const concertId = document.getElementById('concertId').value;
        totalUsersVal = parseInt(document.getElementById('users').value) || 500;

        document.getElementById('startBtn').disabled = true;
        setBadge('running');
        resetNumbers();
        document.getElementById('totalUsers').textContent = totalUsersVal;

        fetch(`/v7/demo/start?concertId=${concertId}&users=${totalUsersVal}`, { method: 'POST' })
            .catch(err => console.error('start error:', err));

        connectSSE(concertId);
    }

    function connectSSE(concertId) {
        if (sse) sse.close();
        sse = new EventSource(`/v7/demo/stream?concertId=${concertId}`);

        sse.addEventListener('stats', (e) => {
            const d = JSON.parse(e.data);
            totalUsersVal = d.totalUsers || totalUsersVal;
            render(d);

            if (!d.running) {
                sse.close();
                sse = null;
                document.getElementById('startBtn').disabled = false;
                setBadge('done');
            }
        });

        sse.onerror = () => {
            document.getElementById('startBtn').disabled = false;
            setBadge('idle');
        };
    }

    function render(d) {
        setText('totalUsers',     d.totalUsers);
        setText('enqueuedCount',  d.enqueuedCount);
        setText('successCount',   d.successCount);
        setText('soldOutCount',   d.soldOutCount);
        setText('failedCount',    d.failedCount);
        setText('abandonedCount', d.abandonedCount);
        setText('redisStock',     Math.max(0, d.redisStock));
        setText('processingCount', d.processingCount);
        setText('waitingCount',   d.waitingCount);

        const total = d.totalUsers > 0 ? d.totalUsers : 1;
        const done  = d.successCount + d.soldOutCount + d.failedCount + d.abandonedCount;

        setBar('processingBar', (d.processingCount / 200) * 100);
        setBar('waitingBar',    (d.waitingCount / total) * 100);
        setBar('successBar',    (d.successCount / 100) * 100);   // 재고 100 기준
        setBar('stockBar',      (Math.max(0, d.redisStock) / 100) * 100);
        setBar('progressBar',   (done / total) * 100);

        document.getElementById('progressText').textContent = `${done} / ${d.totalUsers}`;
    }

    function setText(id, val) { document.getElementById(id).textContent = val; }
    function setBar(id, pct)  { document.getElementById(id).style.width = Math.min(100, Math.max(0, pct)) + '%'; }

    function setBadge(state) {
        const el   = document.getElementById('badge');
        const dot  = el.querySelector('.dot');
        const text = document.getElementById('badgeText');
        el.className = 'badge';
        dot.className = 'dot';
        if (state === 'running') {
            el.classList.add('badge-running');
            dot.classList.add('pulse');
            text.textContent = '실행 중';
        } else if (state === 'done') {
            el.classList.add('badge-done');
            text.textContent = '완료';
        } else {
            el.classList.add('badge-idle');
            text.textContent = '대기 중';
        }
    }

    function resetNumbers() {
        ['enqueuedCount','successCount','soldOutCount','failedCount','abandonedCount'].forEach(id => setText(id, '0'));
        setText('processingCount', '0');
        setText('waitingCount', '0');
        setText('redisStock', '100');
        ['processingBar','waitingBar','successBar','progressBar'].forEach(id => setBar(id, 0));
        setBar('stockBar', 100);
        document.getElementById('progressText').textContent = '0 / 0';
    }

    function resetUI() {
        if (sse) { sse.close(); sse = null; }
        document.getElementById('startBtn').disabled = false;
        setBadge('idle');
        resetNumbers();
        setText('totalUsers', '-');
    }
</script>
</body>
</html>
